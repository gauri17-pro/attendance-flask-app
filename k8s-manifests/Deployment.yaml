apiVersion: apps/v1 
kind: Deployment
metadata:
  name: attendance-app 
  labels:
    app: attendance-app 
spec:
  replicas: 2 
  selector:
    matchLabels:
      app: attendance-app
  template:
    metadata:
      labels:
        app: attendance-app
    spec:
      containers:
        - name: attendance-app-container 
          image: gauris17/attendanceapp:latest
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: web-config
      imagePullSecrets:
        - name: docker-creds
      resources:
        requests:
          cpu: "100m"
          memory: "128Mi"
        limits:
          cpu: "500m"
          memory: "512Mi"


