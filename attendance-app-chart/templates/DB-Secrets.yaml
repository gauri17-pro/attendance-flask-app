---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: {{ .Values.dbSecretName }}
  namespace: {{ .Values.namespace }}
spec:
  encryptedData:
    DB_PASSWORD: {{ .Values.dbPassword }} 
    DB_USER: {{ .Values.dbUser }}
  template:
    metadata:
      name: {{ .Values.dbSecretName }}
      namespace: {{ .Values.namespace }}